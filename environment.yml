name: sdp-2026
channels:
  - conda-forge
  - defaults

dependencies:
  # --- Core ---------------------------------------------------------------
  - python=3.10
  - pip

  # --- Scientific stack ---------------------------------------------------
  - numpy>=1.24,<2.0
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - scikit-image
  - tqdm
  - pillow
  - pyyaml
  - opencv

  # --- Geospatial / raster (conda-forge only, no channel conflicts) -------
  - rasterio
  - gdal
  - pyproj
  - shapely
  - fiona
  - geopandas
  - rioxarray

  # --- Jupyter / dev ------------------------------------------------------
  - jupyterlab
  - ipykernel
  - notebook

  # --- PyTorch via pip (avoids pytorch/nvidia channel solver hell) --------
  - pip:
      - torch==2.1.*
      - torchvision==0.16.*
      - torchaudio==2.1.*
      - --extra-index-url https://download.pytorch.org/whl/cu118
      - -r requirements.txt